docRoot $VH_ROOT/web/
enableGzip 1


context / {
  allowBrowse 1
  location $DOC_ROOT/
  rewrite  {
    RewriteFile .htaccess
  }
}

expires {
  enableExpires 1
}

errorlog stderr {
  logLevel DEBUG
  useServer 0
}

accessLog stdout {
  logReferer 1
  logUserAgent 1
  useServer 0
}

rewrite {
  enable 0
  logLevel 0
}

hotlinkCtrl {
  suffixes gif,  jpeg,  jpg
  allowedHosts
  allowDirectAccess 1
  enableHotlinkCtrl 0
  onlySelf 1
}

accessControl {
  deny
  allow *
}

general {
  enableContextAC 0
}
